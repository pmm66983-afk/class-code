<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.S.R הפקות</title>
    <link rel="stylesheet" href="stil.css">
</head>
<body>
    <form action="https://formspree.io/f/mwvanvrr" method="post">
        <h1>טופס הרשמה להקלטה באולפן </h1>
        
        <div class="bsr">
            <label for="name">שם</label>
            <input type="text" id="name" placeholder="שם" name="name">
        </div>
        <div class="bsr">
            <label for="email">אימייל</label>
            <input type="email" id="email" placeholder="pmm66983@gmail.com" name="email">
        </div>
        <div class="bsr">
            <label for="age">גיל</label>
            <input type="number" id="age" placeholder="גיל" min="0" name="age">
        </div>
        <div class="bsr">
            <label for="tel">טלפון</label>
            <input type="tel" id="tel" placeholder="052-7699755" name="tel">
        </div>
        <div class="bsr">
            <label for="date">תאריך ההקלטה</label>
            <input type="date" id="date" placeholder="04/20/2026" name="date">
        </div>
        <div class="bsr">
            <label for="country">עיר מגורים</label>
            <select  id="country"name = "country">
             <option value="בני ברק">בני ברק</option>
             <option value="תל אביב">תל אביב </option>
             <option value="פתח תקוה">פתח תקוה </option>
             <option value="ירושלים" >ירושלים</option>
             <option value="רמת גן ">רמת גן</option>
             <option value="קרית גת ">קרית גת </option>
            </select>
        </div>
         <div class="bsr">
             <button type="submit">שליחה</button>
             <button type="reset">איפוס</button>
         </div>
         <div class="bsr">
               <label>חתימה</label>
               <canvas id="signature" width="300" height="120"></canvas>
               <button type="button" onclick="clearSignature()">נקה חתימה</button>
         </div>
         <h2>בהצלחה</h2>
    </form>
</body>
</html>
